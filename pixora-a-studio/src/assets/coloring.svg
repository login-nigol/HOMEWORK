<svg xmlns="http://www.w3.org/2000/svg" style="display:none">

  <!-- солнце -->
  <symbol id="c-sun" viewBox="0 0 100 100">
    <!-- лучи -->
    <line x1="50" y1="5" x2="50" y2="18" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="50" y1="82" x2="50" y2="95" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="5" y1="50" x2="18" y2="50" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="82" y1="50" x2="95" y2="50" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="15" x2="24" y2="24" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="76" y1="76" x2="85" y2="85" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="85" y1="15" x2="76" y2="24" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <line x1="15" y1="85" x2="24" y2="76" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <!-- круг -->
    <circle cx="50" cy="50" r="22" fill="white" stroke="#333" stroke-width="3"/>
    <!-- лицо -->
    <circle cx="42" cy="45" r="3" fill="#333"/>
    <circle cx="58" cy="45" r="3" fill="#333"/>
    <path d="M42 58 Q50 65 58 58" fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
  </symbol>

  <!-- цветок -->
  <symbol id="c-flower" viewBox="0 0 100 100">
    <!-- стебель -->
    <line x1="50" y1="65" x2="50" y2="95" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <!-- листик -->
    <path d="M50 80 Q35 70 38 58" fill="white" stroke="#333" stroke-width="2"/>
    <!-- лепестки -->
    <ellipse cx="50" cy="30" rx="10" ry="18" fill="white" stroke="#333" stroke-width="2.5"/>
    <ellipse cx="50" cy="30" rx="10" ry="18" fill="white" stroke="#333" stroke-width="2.5" transform="rotate(45 50 50)"/>
    <ellipse cx="50" cy="30" rx="10" ry="18" fill="white" stroke="#333" stroke-width="2.5" transform="rotate(90 50 50)"/>
    <ellipse cx="50" cy="30" rx="10" ry="18" fill="white" stroke="#333" stroke-width="2.5" transform="rotate(135 50 50)"/>
    <!-- центр -->
    <circle cx="50" cy="50" r="10" fill="white" stroke="#333" stroke-width="2.5"/>
  </symbol>

  <!-- бабочка -->
  <symbol id="c-butterfly" viewBox="0 0 100 100">
    <!-- тело -->
    <ellipse cx="50" cy="50" rx="4" ry="18" fill="white" stroke="#333" stroke-width="2.5"/>
    <!-- усики -->
    <path d="M48 33 Q40 20 35 15" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <path d="M52 33 Q60 20 65 15" fill="none" stroke="#333" stroke-width="2" stroke-linecap="round"/>
    <circle cx="35" cy="15" r="3" fill="white" stroke="#333" stroke-width="2"/>
    <circle cx="65" cy="15" r="3" fill="white" stroke="#333" stroke-width="2"/>
    <!-- верхние крылья -->
    <path d="M50 38 Q20 15 15 38 Q18 55 50 50Z" fill="white" stroke="#333" stroke-width="2.5"/>
    <path d="M50 38 Q80 15 85 38 Q82 55 50 50Z" fill="white" stroke="#333" stroke-width="2.5"/>
    <!-- нижние крылья -->
    <path d="M50 55 Q22 50 20 68 Q25 82 50 65Z" fill="white" stroke="#333" stroke-width="2.5"/>
    <path d="M50 55 Q78 50 80 68 Q75 82 50 65Z" fill="white" stroke="#333" stroke-width="2.5"/>
    <!-- узоры -->
    <circle cx="32" cy="40" r="5" fill="white" stroke="#333" stroke-width="1.5"/>
    <circle cx="68" cy="40" r="5" fill="white" stroke="#333" stroke-width="1.5"/>
  </symbol>

  <!-- домик -->
  <symbol id="c-house" viewBox="0 0 100 100">
    <!-- стены -->
    <rect x="15" y="50" width="70" height="45" fill="white" stroke="#333" stroke-width="2.5"/>
    <!-- крыша -->
    <polygon points="50,10 8,52 92,52" fill="white" stroke="#333" stroke-width="2.5"/>
    <!-- дверь -->
    <rect x="38" y="68" width="24" height="27" rx="3" fill="white" stroke="#333" stroke-width="2"/>
    <!-- окна -->
    <rect x="20" y="58" width="18" height="16" rx="2" fill="white" stroke="#333" stroke-width="2"/>
    <rect x="62" y="58" width="18" height="16" rx="2" fill="white" stroke="#333" stroke-width="2"/>
    <!-- крест на окнах -->
    <line x1="29" y1="58" x2="29" y2="74" stroke="#333" stroke-width="1.5"/>
    <line x1="20" y1="66" x2="38" y2="66" stroke="#333" stroke-width="1.5"/>
    <line x1="71" y1="58" x2="71" y2="74" stroke="#333" stroke-width="1.5"/>
    <line x1="62" y1="66" x2="80" y2="66" stroke="#333" stroke-width="1.5"/>
    <!-- ручка двери -->
    <circle cx="58" cy="83" r="2.5" fill="white" stroke="#333" stroke-width="1.5"/>
  </symbol>

  <!-- котик -->
  <symbol id="c-cat" viewBox="0 0 100 100">
    <!-- уши -->
    <polygon points="25,20 18,5 38,18" fill="white" stroke="#333" stroke-width="2.5"/>
    <polygon points="75,20 82,5 62,18" fill="white" stroke="#333" stroke-width="2.5"/>
    <!-- голова -->
    <circle cx="50" cy="38" r="28" fill="white" stroke="#333" stroke-width="2.5"/>
    <!-- тело -->
    <ellipse cx="50" cy="78" rx="22" ry="18" fill="white" stroke="#333" stroke-width="2.5"/>
    <!-- хвост -->
    <path d="M72 85 Q92 75 88 60 Q85 50 78 55" fill="none" stroke="#333" stroke-width="3" stroke-linecap="round"/>
    <!-- глаза -->
    <circle cx="38" cy="35" r="6" fill="white" stroke="#333" stroke-width="2"/>
    <circle cx="62" cy="35" r="6" fill="white" stroke="#333" stroke-width="2"/>
    <circle cx="39" cy="36" r="3" fill="#333"/>
    <circle cx="63" cy="36" r="3" fill="#333"/>
    <!-- нос -->
    <polygon points="50,45 46,50 54,50" fill="white" stroke="#333" stroke-width="1.5"/>
    <!-- усы -->
    <line x1="22" y1="50" x2="44" y2="52" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="22" y1="55" x2="44" y2="55" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="56" y1="52" x2="78" y2="50" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="56" y1="55" x2="78" y2="55" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
    <!-- рот -->
    <path d="M46 52 Q50 58 54 52" fill="none" stroke="#333" stroke-width="1.5" stroke-linecap="round"/>
  </symbol>

</svg>
