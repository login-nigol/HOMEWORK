<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, height=device-height, initial-scale=1">
  <title>Pixora A. Studio</title>
  <link rel="stylesheet" href="./styles/main.css" type="text/css">
</head>

<body>
  <!-- App shell -->
  <div class="app">

    <!-- Top toolbar - глобальные действия -->
    <header class="toolbar" aria-label="Toolbar">
      <span class="toolbar__titel">Pixora A. Studio</span>

      <button class="toolbar-btn" data-action="undo"
        title="Отменить (Ctrl+Z)">↩️</button>
      <button class="toolbar-btn" data-action="redo"
        title="Повторить (Ctrl+Shift+Z)">↪️</button>
    </header>

    <!-- панель инструментов -->
    <nav class="tools-panel" aria-label="Tools panel">
      <!-- выбор инструмента -->
      <button class="tool-btn tool-btn--active" data-tool="brush"
        title="Кисть">🖌️</button>
      <button class="tool-btn" data-tool="eraser" title="Ластик">🧹</button>

      <!-- подменю активного инструмента (показываем/скрываем) -->
      <div class="tools-panel--submenu" data-submenu="brush">
        <label class="tool-label">
          <input class="tool-color" type="color" value="#000000" title="Цвет">
        </label>

        <label class="tool-label">
          <input class="tool-size" type="range" min="1" max="50" value="5"
            title="Размер">
        </label>
      </div>
    </nav>

    <!-- Main area - основная панель -->
    <main class="workspace">

      <!-- side panel - панель слоёв -->
      <aside class="layers-panel" aria-label="Layers panel">
        <div class="layers-panel__body">
          <div class="layers-panel__content">
            <!-- управление слоями -->
            <div class="layers-panel__controls">

              <button class="layer-btn" data-action="add"
                title="Добавить слой">➕</button>
              <button class="layer-btn" data-action="delete"
                title="Удалить слой">🗑️</button>
              <button class="layer-btn" data-action="up"
                title="Слой выше">⬆️</button>
              <button class="layer-btn" data-action="down"
                title="Слой ниже">⬇️</button>
              <button class="layer-btn" data-action="toggle"
                title="Скрыть/показать">👁️</button>

            </div>
            <!-- список слоёв (заполняется из JS) -->
            <ul class="layers-panel__list"></ul>
          </div>
        </div>
        <!-- сворачивание панели слоёв -->
        <button class="layers-panel__toggle"
          title="Свернуть/развернуть">◀</button>
      </aside>

      <!-- Stage (canvs area) - холст -->
      <section class="stage" aria-label="Canvas stage">
        <div class="stage__stack"></div>
      </section>

    </main>
  </div>

  <script type="module" src="./js/main.js"></script>
</body>

</html>
